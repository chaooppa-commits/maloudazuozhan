<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>马喽大作战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════ Start Screen ═══════ -->
  <div id="start-screen">
    <h1>马喽大作战</h1>
    <p class="subtitle">马喽的皮鞭准备好了吗？</p>

    <!-- 登录/注册 Tab 切换 -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
    </div>

    <!-- ═══ 登录面板 ═══ -->
    <div class="auth-panel active" id="login-panel">
      <div class="start-section">
        <div class="config-group">
          <input type="text" class="seed-input" id="username-input" placeholder="你的昵称" maxlength="12">
          <input type="text" class="seed-input" id="pincode-input" placeholder="4位密码" maxlength="4" inputmode="numeric" style="margin-top:16px">
          <div class="wallet-inline" id="wallet-display">您的荷包：<span id="wallet-amount">--</span></div>
          <div class="pincode-hint" id="pincode-hint"></div>
        </div>
      </div>

      <!-- 对战设定 -->
      <div class="start-section">
        <div class="config-group" id="buyin-group">
          <label>入场金额</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-buyin="50" onclick="selectBuyin(50, this)">$50</button>
            <button class="mode-btn" data-buyin="100" onclick="selectBuyin(100, this)">$100</button>
            <button class="mode-btn" data-buyin="200" onclick="selectBuyin(200, this)">$200</button>
          </div>
        </div>
        <div class="config-group">
          <label>如何伺候老板？</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="manual" onclick="selectMode('manual')">
              亲手服侍
              <div class="mode-desc">4/8/12/16</div>
            </button>
            <button class="mode-btn" data-mode="kelly" onclick="selectMode('kelly')">
              懒得动手
              <div class="mode-desc">1/2 Kelly</div>
            </button>
          </div>
        </div>
      </div>

      <input type="hidden" id="seed-input" value="">

      <div class="start-section">
        <button class="start-btn" onclick="doLogin()">老板来快活</button>
      </div>
    </div>

    <!-- ═══ 注册面板 ═══ -->
    <div class="auth-panel" id="register-panel">
      <div class="start-section">
        <div class="config-group">
          <input type="text" class="seed-input" id="reg-username-input" placeholder="你的昵称" maxlength="12">
          <input type="text" class="seed-input" id="reg-pincode-input" placeholder="设置4位密码" maxlength="4" inputmode="numeric" style="margin-top:16px">
          <input type="text" class="seed-input" id="reg-pincode-confirm" placeholder="确认密码" maxlength="4" inputmode="numeric" style="margin-top:16px">
          <div class="reg-balance">初始荷包：$300</div>
          <div class="pincode-hint" id="reg-hint"></div>
        </div>
      </div>

      <div class="start-section">
        <button class="start-btn" onclick="doRegisterAndLaunch()">注册并开局</button>
      </div>
    </div>
  </div>

  <!-- ═══════ Game Screen ═══════ -->
  <div id="game-screen">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="purse-display">
        <div class="purse-item">
          <div class="purse-label">马喽</div>
          <div class="purse-value obs" id="obs-purse">$50</div>
          <div class="purse-bar"><div class="purse-bar-fill obs" id="obs-bar" style="width:50%"></div></div>
        </div>
        <div class="purse-item">
          <div class="purse-label">老板</div>
          <div class="purse-value boss" id="boss-purse">$50</div>
          <div class="purse-bar"><div class="purse-bar-fill boss" id="boss-bar" style="width:50%"></div></div>
        </div>
      </div>
      <div class="round-info">
        <span class="ri-tag">ALL </span><span class="ri-val" id="round-num">0</span>
        <span class="ri-tag">IN </span><span class="ri-val" id="round-in">0</span>
        <span class="ri-tag">WIN </span><span class="ri-val" id="round-win">0</span>
      </div>
    </div>

    <!-- PnL chart -->
    <div class="pnl-chart-row">
      <div class="pnl-chart">
        <canvas id="pnl-canvas"></canvas>
      </div>
      <div class="pnl-labels" id="pnl-labels"></div>
      <button class="tier-table-btn" onclick="showQuiz()" title="战力记忆练习"><svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M754.5 573.1c-16.8-14.3-42.1-12.3-56.4 4.5l-76.4 89.6-25.8-30.5c-14.3-16.9-39.5-19-56.4-4.7s-19 39.5-4.7 56.4l32.7 38.6 2.5 2.1c14.1 12 32.5 18.6 51.7 18.6s37.6-6.6 51.7-18.6l2.5-2.1 83.1-97.5c14.3-16.8 12.3-42.1-4.5-56.4zM348.3 562.8c-51.2 0-92.8 41.6-92.8 92.8s41.6 92.8 92.8 92.8 92.8-41.6 92.8-92.8-41.6-92.8-92.8-92.8z m0 105.6c-7.1 0-12.8-5.8-12.8-12.8s5.8-12.8 12.8-12.8 12.8 5.8 12.8 12.8-5.7 12.8-12.8 12.8zM348.3 275.6c-51.2 0-92.8 41.6-92.8 92.8s41.6 92.8 92.8 92.8 92.8-41.6 92.8-92.8-41.6-92.8-92.8-92.8z m0 105.6c-7.1 0-12.8-5.8-12.8-12.8s5.8-12.8 12.8-12.8 12.8 5.8 12.8 12.8-5.7 12.8-12.8 12.8zM641.3 461.2c51.2 0 92.8-41.6 92.8-92.8s-41.6-92.8-92.8-92.8-92.8 41.6-92.8 92.8 41.6 92.8 92.8 92.8z m0-105.6c7.1 0 12.8 5.8 12.8 12.8s-5.8 12.8-12.8 12.8-12.8-5.8-12.8-12.8 5.7-12.8 12.8-12.8z"/><path d="M813.2 99.7H210.8c-81.6 0-148.1 66.4-148.1 148.1v528.5c0 81.6 66.4 148.1 148.1 148.1h602.5c81.6 0 148.1-66.4 148.1-148.1V247.8c-0.1-81.7-66.5-148.1-148.2-148.1z m63.5 676.5c0 35-28.5 63.5-63.5 63.5H210.8c-35 0-63.5-28.5-63.5-63.5V247.8c0-35 28.5-63.5 63.5-63.5h602.5c35 0 63.5 28.5 63.5 63.5v528.4z"/></svg></button>
      <button class="tier-table-btn" onclick="showTierTable()" title="战力表"><svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M769.1 69H254.9C171.7 69 104 136.7 104 219.9v584.2c0 83.2 67.7 150.9 150.9 150.9h514.2c83.2 0 150.9-67.7 150.9-150.9V219.9C920 136.7 852.3 69 769.1 69zM840 804.1c0 39.1-31.8 70.9-70.9 70.9H254.9c-39.1 0-70.9-31.8-70.9-70.9V219.9c0-39.1 31.8-70.9 70.9-70.9h514.2c39.1 0 70.9 31.8 70.9 70.9v584.2z"/><path d="M577.2 334c-10.6-27-36.2-44.5-65.2-44.5S457.4 307 446.8 334L311.4 679.9c-8 20.6 2.1 43.8 22.7 51.8 4.8 1.9 9.7 2.8 14.6 2.8 16 0 31.1-9.7 37.3-25.4l48.5-123.8h155.2l48.5 123.8c8 20.6 31.3 30.7 51.8 22.7 20.6-8 30.7-31.3 22.7-51.8L577.2 334zM465.7 505.3L512 386.9l46.3 118.3h-92.6z"/></svg></button>
      <button class="tier-table-btn" onclick="toggleTheme()" id="theme-btn" title="切换主题"><svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M919.6 319L746.4 120.8l-0.7-0.8c-15.9-17.3-38.9-25.3-61.7-21.5-23.3 3.9-43 19.6-52.7 42-19.6 45.1-64 72.1-118.8 72.1h-1.9c-55.2 0.8-98.5-25.1-118.9-71.4-9.8-22.3-29.6-37.8-52.8-41.7-22.7-3.8-45.7 4.3-61.6 21.5l-0.3 0.4L104.4 319C79 346.8 65.1 383.5 65.1 422.5c0 39.2 14.1 76.1 39.7 103.9l0.3 0.3c26.4 28.7 62.8 44.6 100.3 44.6 3 0 6.1-0.1 9.2-0.3v215.4c0 77.2 62.8 140 140 140h314c77.2 0 140-62.8 140-140V570.9c3.4 0.3 6.9 0.4 10.3 0.4 37.5 0 73.8-15.9 100.2-44.6l0.2-0.2c25.6-27.8 39.7-64.8 39.7-103.9-0.1-39.1-14-75.8-39.4-103.6z m-59.3 153.3l-0.2 0.2c-13.4 14.5-31.6 21.1-50 18.1-20.4-3.4-41.2 2.3-57 15.7-15.7 13.3-24.7 32.7-24.7 53.3v226.8c0 33.1-26.9 60-60 60h-314c-33.1 0-60-26.9-60-60V559.8c0-20.5-8.9-39.8-24.5-53.1-12.8-11-29-16.9-45.6-16.9-3.6 0-7.3 0.3-11 0.9-18.2 2.9-36.3-3.8-49.5-18.1l-0.3-0.3c-24.8-27-24.8-72.6 0-99.6l0.3-0.4 161.3-184.7c16 29.8 38.9 54.7 67.1 72.8 34.5 22 76.3 33.2 120.9 32.2h0.5c80.1-0.4 149.1-40.5 184-105.9l162 185.3 0.7 0.8c24.8 26.9 24.8 72.5 0 99.5z"/></svg></button>
    </div>

    <!-- Card table -->
    <div class="card-table" id="card-table">
      <!-- Rendered dynamically -->
    </div>

    <!-- Result section (hidden until reveal) -->
    <div class="result-section" id="result-section">
      <!-- Rendered dynamically -->
    </div>

    <!-- Action bar -->
    <div class="action-bar" id="action-bar">
      <!-- Rendered dynamically -->
    </div>
  </div>

  <!-- Review overlay -->
  <div class="review-overlay" id="review-overlay"></div>

  <!-- ═══════ End Screen ═══════ -->
  <div id="end-screen">
    <div class="end-scroll">
    <div class="end-header-row" style="display:none">
      <span id="end-title"></span>
      <span id="end-subtitle" class="end-subtitle"></span>
    </div>
    <div class="end-pnl-chart-wrap">
      <div class="end-pnl-chart">
        <canvas id="end-pnl-canvas"></canvas>
      </div>
      <div class="pnl-labels" id="end-pnl-labels"></div>
    </div>
    <div class="stats-grid" id="stats-grid">
      <!-- Rendered dynamically -->
    </div>
    <div class="action-summary" id="action-summary">
      <!-- 出手规范分析 -->
    </div>
    <div class="end-actions">
      <button class="end-btn secondary" onclick="downloadLog()">日志</button>
      <button class="end-btn primary" onclick="backToStart()">再战</button>
    </div>
    </div>
  </div>

  <!-- ═══════ Analysis Modal ═══════ -->
  <div class="modal-overlay" id="analysis-modal" onclick="closeAnalysis(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>分析</h3>
        <button class="modal-close" onclick="closeAnalysis()">&times;</button>
      </div>
      <div class="modal-body" id="analysis-body">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </div>

  <!-- ═══════ Tier Table Modal ═══════ -->
  <div class="modal-overlay" id="tier-table-modal" onclick="closeTierTable(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>战力表</h3>
        <button class="modal-close" onclick="closeTierTable()">&times;</button>
      </div>
      <div class="modal-body" id="tier-table-body"></div>
    </div>
  </div>

  <!-- ═══════ Quiz Modal ═══════ -->
  <div class="modal-overlay" id="quiz-modal" onclick="closeQuiz(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>战力训练</h3>
        <button class="modal-close" onclick="closeQuiz()">&times;</button>
      </div>
      <div class="modal-body" style="padding-bottom:24px">
        <div class="quiz-mode-tabs">
          <button class="quiz-tab active" id="quiz-tab-mn" onclick="qSwitchMode('mn')">识别码</button>
          <button class="quiz-tab" id="quiz-tab-tier" onclick="qSwitchMode('tier')">战力</button>
        </div>
        <div class="quiz-score-line" id="quiz-score-line">0 / 0 · 第 1 题</div>
        <div id="quiz-area"></div>
      </div>
    </div>
  </div>

  <script src="js/game.js?v=3"></script>
  <script src="js/app-v3.js"></script>
  <script>
    // 版本检查：确认 app-v3.js 已加载
    if (typeof APP_VERSION === 'undefined' || APP_VERSION !== 'v3.0') {
      console.error('[FATAL] app-v3.js 未加载！当前 APP_VERSION=', APP_VERSION);
      alert('⚠️ 游戏引擎未正确加载，请强制刷新页面（Cmd+Shift+R）');
    } else {
      console.log('[OK] 游戏引擎', APP_VERSION, '已加载');
    }

    // ═══════════════════════════════════════════════════════
    // UI Controller
    // ═══════════════════════════════════════════════════════

    // 版本检查：确认 app-v3.js 已加载
    if (typeof APP_VERSION === 'undefined' || APP_VERSION !== 'v3.0') {
      console.error('[FATAL] app-v3.js 未加载！当前 APP_VERSION=', APP_VERSION);
      alert('游戏引擎未正确加载，请强制刷新页面');
    } else {
      console.log('[OK] 游戏引擎', APP_VERSION, '已加载');
    }

    let selectedMode = 'manual';

    // ═══════════════════════════════════════════════════════
    // Haptic + Audio Feedback (iOS-safe)
    // ═══════════════════════════════════════════════════════

    // 全局创建唯一的音频对象（预加载，不消耗多少流量）
    const _tapAudio = new Audio('https://xu-chao.github.io/mp3/tap.mp3');
    _tapAudio.preload = 'auto';
    _tapAudio.volume = 0.4;

    function tap() {
      // Vibrate (Android only, iOS ignores)
      if (navigator.vibrate) navigator.vibrate(10);
      try {
        // 每次播放前重置进度到开头，防止连续快速点击时声音被截断
        _tapAudio.currentTime = 0;
        // 使用 Promise 播放，捕获并处理可能的拦截错误
        const playPromise = _tapAudio.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.log("音频播放被浏览器拦截，等待用户交互解锁:", error);
          });
        }
      } catch(e) {
        console.error("音频播放异常:", e);
      }
    }

    // 移动端无感解锁音频源
    let _audioUnlocked = false;
    function _unlockAudio() {
      if (_audioUnlocked) return;
      _tapAudio.play().then(() => {
        _audioUnlocked = true;
        // 激活成功后，立刻暂停并重置，用户完全听不到声音，但音频通道已经对该网页终身放行
        _tapAudio.pause();
        _tapAudio.currentTime = 0;
        // 解锁成功后移除事件监听，不留垃圾内存
        document.removeEventListener('click', _unlockAudio);
        document.removeEventListener('touchstart', _unlockAudio);
        console.log("【音频通道】已成功无感解锁！");
      }).catch(() => {
        // 如果还没交互就触发了，静默等待下一次
      });
    }
    // 监听用户的第一次点击或触摸操作
    document.addEventListener('click', _unlockAudio);
    document.addEventListener('touchstart', _unlockAudio);


    // ═══════════════════════════════════════════════════════
    // 身份验证（登录/注册分离，无防抖状态机）
    // ═══════════════════════════════════════════════════════

    let _walletBalance = null;  // null = 未验证；数字 = 已验证余额
    let _authState = 'idle';    // 'idle' | 'verified'
    let selectedBuyin = 50;

    function selectBuyin(amount, btn) {
      tap();
      selectedBuyin = amount;
      document.querySelectorAll('[data-buyin]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // ─── Tab 切换 ────────────────────────────────────────────────────────

    function switchAuthTab(tab) {
      // 1. 如果当前已是验证成功状态，用户主动切 Tab 意味着想换身份，打回原形
      if (_authState === 'verified') {
        _authState = 'idle';
        _walletBalance = null;
        updateWalletDisplay();
      }

      // 2. 丝滑细节：切 Tab 时，自动把上一个 Tab 填好的昵称同步过去，省得用户重打
      const loginName = document.getElementById('username-input').value.trim();
      const regName   = document.getElementById('reg-username-input').value.trim();
      if (tab === 'register' && loginName && !regName) {
        document.getElementById('reg-username-input').value = loginName;
      } else if (tab === 'login' && regName && !loginName) {
        document.getElementById('username-input').value = regName;
      }

      // 3. UI 显隐切换
      document.querySelectorAll('.auth-tab').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));

      if (tab === 'login') {
        document.querySelector('.auth-tab[onclick*="login"]').classList.add('active');
        document.getElementById('login-panel').classList.add('active');
        setHint('请证明你是你自己', 'info');
      } else {
        document.querySelector('.auth-tab[onclick*="register"]').classList.add('active');
        document.getElementById('register-panel').classList.add('active');
        setHint('设定一个4位暗号，初始荷包 $300', 'info');
      }
    }

    // ─── 辅助：UI 反馈 ───────────────────────────────────────────────────────

    function setHint(msg, type) {
      // type: '' | 'ok' | 'err' | 'info'
      // 写入当前可见面板的 hint
      const loginPanel = document.getElementById('login-panel');
      const isLoginVisible = loginPanel.classList.contains('active');
      const el = isLoginVisible ? document.getElementById('pincode-hint') : document.getElementById('reg-hint');
      if (el) {
        el.textContent = msg;
        el.className = 'pincode-hint' + (type ? ' hint-' + type : '');
      }
    }

    function updateWalletDisplay() {
      const amountEl = document.getElementById('wallet-amount');
      if (_walletBalance !== null) {
        amountEl.textContent = _walletBalance;
        document.getElementById('wallet-display').style.visibility = 'visible';
      } else {
        amountEl.textContent = '--';
        document.getElementById('wallet-display').style.visibility = 'hidden';
      }
    }

    // ─── 登录流程 ──────────────────────────────────────────────────────────

    function doLogin() {
      tap();
      // 防止重复点击
      if (_authState === 'checking') return;
      const username = document.getElementById('username-input').value.trim();
      const pincode  = document.getElementById('pincode-input').value.trim();

      // 【测试沙盒彩蛋】
      if (username.toLowerCase() === 'debug') {
        window.IS_TEST_MODE = true;
        _authState = 'verified';
        _walletBalance = 300;
        document.getElementById('pincode-input').value = '0000';
        updateWalletDisplay();
        setHint('【沙盒测试模式】已激活！300筹码已就绪', 'ok');
        _launchGame(username, '0000');
        return;
      }
      window.IS_TEST_MODE = false;

      if (!username) { setHint('请输入昵称', 'err'); return; }
      if (!pincode || pincode.length !== 4) { setHint('请输入4位密码', 'err'); return; }

      // 锁定状态 + 禁用按钮
      _authState = 'checking';
      const loginBtn = document.querySelector('#login-panel .start-btn');
      if (loginBtn) loginBtn.disabled = true;
      setHint('验证中…', 'info');
      doGetWallet(username, pincode, () => _launchGame(username, pincode), loginBtn);
    }

    // ─── 注册流程 ──────────────────────────────────────────────────────────

    function doRegisterAndLaunch() {
      tap();
      // 防止重复点击
      if (_authState === 'checking') return;
      const username = document.getElementById('reg-username-input').value.trim();
      const pincode  = document.getElementById('reg-pincode-input').value.trim();
      const confirm  = document.getElementById('reg-pincode-confirm').value.trim();

      if (!username) { setHint('请输入昵称', 'err'); return; }
      if (!pincode || pincode.length !== 4) { setHint('请设置4位密码', 'err'); return; }
      if (pincode !== confirm) { setHint('两次密码不一致', 'err'); return; }

      // 锁定状态 + 禁用按钮
      _authState = 'checking';
      const regBtn = document.querySelector('#register-panel .start-btn');
      if (regBtn) regBtn.disabled = true;
      setHint('注册中…', 'info');

      fetch(SHEETS_URL + '?action=register&username=' + encodeURIComponent(username) + '&pincode=' + encodeURIComponent(pincode))
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          if (regBtn) regBtn.disabled = false;
          if (window.IS_GAMING) return;
          if (data.status === 'ok') {
            _walletBalance = data.balance;
            _authState = 'verified';
            localStorage.setItem('doukou_username', username);
            localStorage.setItem('doukou_pincode', pincode);
            setHint('注册成功！获得 ' + data.balance + ' 筹码', 'ok');
            updateWalletDisplay();
            // 同步填入登录面板，方便下次
            document.getElementById('username-input').value = username;
            document.getElementById('pincode-input').value = pincode;
            _launchGame(username, pincode);
          } else if (data.status === 'duplicate') {
            _authState = 'idle';
            setHint('昵称已被注册，请换一个或直接登录', 'err');
            updateWalletDisplay();
          } else {
            _authState = 'idle';
            setHint('注册失败：' + (data.message || ''), 'err');
            updateWalletDisplay();
          }

          if (regBtn) regBtn.disabled = false;
          if (window.IS_GAMING) return;
          _authState = 'idle';
          setHint('注册失败（请检查网络）', 'err');

    function doGetWallet(username, pincode, callback, btnEl) {
      setHint('验证中…', 'info');
      fetch(SHEETS_URL + '?action=getWallet&username=' + encodeURIComponent(username) + '&pincode=' + encodeURIComponent(pincode))
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          if (btnEl) btnEl.disabled = false;
          if (window.IS_GAMING) return;
          if (data.status === 'ok') {
            _walletBalance = data.balance;
            _authState = 'verified';
            localStorage.setItem('doukou_username', username);
            localStorage.setItem('doukou_pincode', pincode);
            setHint('荷包：' + data.balance + ' 筹码', 'ok');
            updateWalletDisplay();
            if (callback) callback();
          } else if (data.status === 'wrong_pin') {
            _authState = 'idle';
            setHint('密码错误，请重试', 'err');
            updateWalletDisplay();
          } else {
            _authState = 'idle';
            setHint('账号不存在，请先注册', 'err');
            updateWalletDisplay();
          }
        })
        .catch(() => {
          if (btnEl) btnEl.disabled = false;
          if (window.IS_GAMING) return;
          _authState = 'idle';
          setHint('网络连接失败，请重试', 'err');
          updateWalletDisplay();
        });
    }

      window.IS_GAMING = true;

      // 入场金额：不超过荷包余额，优先用荷包余额作为带入上限
      const walletBal = (_walletBalance !== null && _walletBalance > 0) ? _walletBalance : selectedBuyin;
      const buyin = Math.min(selectedBuyin, walletBal);

      game._username     = username;
      game._pincode      = pincode;

    // ═══════════════════════════════════════════════════════
    // Shadow Player (影子选手)
    // ═══════════════════════════════════════════════════════
    const SHADOW_EXIT_OBS_RATIO = 0.4;  // 影子退场：影子筹码 ≤ 出场筹码的40%时退场
    const SHADOW_EXIT_BOSS_RATIO = 0.2; // 影子退场：老板筹码 ≤ 出场筹码的20%时退场

    const shadow = {
      purse: INITIAL_PURSE,
      bossPurse: INITIAL_PURSE,  // 影子对局的独立老板筹码
      bet: 0, skip: 0, win: 0, lose: 0, totalStaked: 0,
      exited: false,
      pnlHistory: [0]
    };

    // 影子初始筹码与观察者同步（在 startGame 前设好默认值）

    function shadowReset() {
      const ip = (typeof game !== 'undefined' && game._initialPurse) ? game._initialPurse : INITIAL_PURSE;
      shadow.purse = ip;
      shadow.bossPurse = ip;  // 影子老板筹码与出场金额同步
      shadow.bet = 0; shadow.skip = 0;
      shadow.win = 0; shadow.lose = 0;
      shadow.totalStaked = 0;
      shadow.exited = false;
      shadow.pnlHistory = [0];
    }

    /**
     * 计算某手牌对应的福星卡消耗档位降幅
     *
     * 规则：
     *  - 每张福星卡消耗 = 降1档（牌值1按0.5计算，向下取整）
     *  - 自己的起手牌不算消耗（如 9,2 的福星=9，自身9不计）
     *  - 例如 boss 拿 9,2 福星=9；玩家A拿 9,3；则 boss 视角只看到 1 张 9 被消耗
     *
     * 返回值：最大档位降幅整数（0 = 不降档，1 = 降 1 档，...）
     */
    function countUsedBlessings(a, b, allVisible) {
      const bless = blessingCards(a, b, []);  // 获取该组合的全部福星卡属性
      let maxTierDrop = 0;
      for (const bl of bless) {
        const x = bl.value;
        // 场上有多少张 x 不在该玩家自己手中（自己的起手牌不算消耗）
        let used = allVisible.filter(c => c === x).length;
        if (a === x) used--;  // 排除自己起手牌中的 x
        if (b === x) used--;
        if (used < 0) used = 0;
        // 牌值=1 按 0.5 计算，其他按 1 计算，向下取整，每 1 整数消耗降 1 档
        const weight = (x === 1) ? 0.5 : 1;
        const tierDrop = Math.floor(used * weight);
        if (tierDrop > maxTierDrop) maxTierDrop = tierDrop;
      }
      return maxTierDrop;
    }

    /**
     * 影子选手决策函数
     * 返回 { target, amount } 或 { target: 'SKIP', amount: 0 }
     */
    function shadowDecide(hands, shadowPurse, shadowBossPurse) {
      // 🛡️ 防御：hands 为空或长度不足时直接跳过
      if (!hands || hands.length < 4 || !hands[0] || !hands[1] || !hands[2] || !hands[3]) {
        return { target: 'SKIP', amount: 0 };
      }

      const initialPurse = game._initialPurse || INITIAL_PURSE;
      // 影子退场规则1：影子筹码 ≤ 出场筹码的40%
      if (shadowPurse <= initialPurse * SHADOW_EXIT_OBS_RATIO) {
        return { target: 'RUN', amount: 0 };
      }
      // 影子退场规则2：影子老板筹码 ≤ 出场筹码的20%
      if (shadowBossPurse <= initialPurse * SHADOW_EXIT_BOSS_RATIO) {
        return { target: 'RUN', amount: 0 };
      }

      const allVisible = [];
      for (let i = 0; i < 4; i++) allVisible.push(hands[i][0], hands[i][1]);

      // 老板当前战力（绝对值 + 等级）
      const bossInfo = lookupTier(hands[0][0], hands[0][1]);
      let bossTier = bossInfo ? Math.floor(bossInfo.tier) : 3;
      const bossPower = bossInfo ? (bossInfo.mp || bossInfo.p_eq) : 40;
      const bossTierDrop = countUsedBlessings(hands[0][0], hands[0][1], allVisible);
      if (bossTierDrop >= 1) bossTier = Math.max(1, bossTier - bossTierDrop);

      // ★ 全候选评估：遍历所有员工，各自独立计算降档后的等级差和注额
      // 解决问题：最强员工可能因福星卡降档不满足出手条件，但其他员工仍满足
      let bestTarget = null;
      let bestStake = 0;
      let bestPowerGap = 0;

      for (let i = 1; i <= 3; i++) {
        const lbl = ['A', 'B', 'C'][i - 1];
        const empInfo = lookupTier(hands[i][0], hands[i][1]);
        let empTier = empInfo ? Math.floor(empInfo.tier) : 3;
        const empPower = empInfo ? (empInfo.mp || empInfo.p_eq) : 40;
        const empTierDrop = countUsedBlessings(hands[i][0], hands[i][1], allVisible);
        if (empTierDrop >= 1) empTier = Math.max(1, empTier - empTierDrop);

        const powerGap = empPower - bossPower;
        if (powerGap <= 0) continue;  // 员工不比庄家强，跳过

        // 每个员工独立计算等级差（含降档）
        const tierGap = empTier - bossTier;
        const is1234 = (empInfo && empInfo.mn === '1234');

        let stake = 0;
        if (tierGap === 2 || (tierGap === 1 && is1234)) {
          stake = 4;
        } else if (tierGap === 3) {
          stake = 8;
        } else if (tierGap >= 4) {
          stake = 12;
        }

        if (stake <= 0) continue;  // 降档后不满足出手条件，检查下一个员工

        // 额限
        stake = Math.min(stake, shadowBossPurse, shadowPurse);
        if (stake < 1) continue;

        // 选最高注额的候选（注额相同时选powerGap更大的）
        if (stake > bestStake || (stake === bestStake && powerGap > bestPowerGap)) {
          bestStake = stake;
          bestTarget = lbl;
          bestPowerGap = powerGap;
        }
      }

      if (!bestTarget) return { target: 'SKIP', amount: 0 };

      return { target: bestTarget, amount: bestStake };
    }

    /**
     * 在每局结算后同步影子选手的结果
     * 影子选手拥有独立的 bossPurse，与观察者的 game.bossPurse 完全独立
     */
    function shadowSettle(hands, settlement) {
      if (shadow.exited) return;
      // 🛡️ 防御：hands 或 settlement 异常时安全跳过
      if (!hands || !settlement || !settlement.employeeResults) return;

      // 影子选手使用自己的独立老板筹码进行决策
      const dec = shadowDecide(hands, shadow.purse, shadow.bossPurse);
      game._shadowLastDec = dec; // 保存当局决策以便写入日志

      if (dec.target === 'RUN') {
        shadow.exited = true;
        shadow.skip++; // 退场算作一次跳过统计
        shadow.pnlHistory.push(shadow.pnlHistory[shadow.pnlHistory.length - 1]);
        return;
      }
      if (dec.target === 'SKIP' || dec.amount <= 0) {
        shadow.skip++;
        shadow.pnlHistory.push(shadow.pnlHistory[shadow.pnlHistory.length - 1]);
        return;
      }

      // 影子投注
      const er = settlement.employeeResults[dec.target];
      shadow.bet++;
      shadow.totalStaked += dec.amount;
      let pnl = 0;
      if (er.won) {
        // 影子赢：从影子老板那里拿钱，上限不超过影子老板当前筹码
        pnl = Math.min(dec.amount * er.mult, shadow.bossPurse);
        shadow.win++;
      } else {
        pnl = -dec.amount;
        shadow.lose++;
      }
      shadow.purse += pnl;
      shadow.bossPurse -= pnl;  // 影子老板筹码反向变动
      if (shadow.purse < 0) shadow.purse = 0;
      if (shadow.bossPurse < 0) shadow.bossPurse = 0;
      const cum = shadow.pnlHistory[shadow.pnlHistory.length - 1] + pnl;
      shadow.pnlHistory.push(cum);
    }

    function renderGameScreen(settlement, actionEval) {
      try {

        if (settlement && game.phase === 'result') {
          _lastRoundData = { hands: [...game.hands.map(h => [...h])], settlement, actionEval, betTarget: game.currentBet.target };

          game._lastActionEval = actionEval;

          shadowSettle(game.hands, settlement);
          // 把影子选手当局数据追加到最后一条 round log
          const lastLog = game.log[game.log.length - 1];
          if (lastLog && lastLog.type === 'round') {
            const dec = game._shadowLastDec || {};
            lastLog.shadow = {
              target: dec.target || 'SKIP',

    /**
     * 生成牌桌HTML（可被 renderCardTable 和 showReview 复用）
     * @param {Array} hands - 4家手牌 [[5 cards], ...]
     * @param {Object|null} settlement - 结算数据
     * @param {string} phase - 'betting'|'revealing'|'result'
     * @param {string} selectedTarget - 当前选中员工 'A'|'B'|'C'|null
     */
    function _buildCardTableHtml(hands, settlement, phase, selectedTarget) {
      const isRevealed = phase === 'revealing' || phase === 'result';
      const showTier = phase === 'result';
      const isBetting = phase === 'betting';
      const allVisibleCards = [];

      hands.forEach((hand, i) => {
        allVisibleCards.push(hand[0], hand[1]);
      });

      let html = '';
      const labels = ['Boss', 'A', 'B', 'C'];
      const labelClasses = ['boss', 'emp-a', 'emp-b', 'emp-c'];

      for (let i = 0; i < 4; i++) {
        const hand = hands[i];
        const v = [hand[0], hand[1]];
        const tierInfo = lookupTier(v[0], v[1]);
        const tier = tierInfo ? tierInfo.tier : '-';

        const blessings = blessingCards(v[0], v[1], allVisibleCards);
        // 计算福星卡总消耗（标准卡单位：1号=0.5张，其他=1张）
        let blessConsumed = 0;
        for (const bl of blessings) {
          const x = bl.value;
          let used = allVisibleCards.filter(c => c === x).length;
          if (v[0] === x) used--;
          if (v[1] === x) used--;
          if (used < 0) used = 0;
          const weight = (x === 1) ? 0.5 : 1;
          blessConsumed += used * weight;
        }
        const consumeStr = blessConsumed > 0 ? `-${Number.isInteger(blessConsumed) ? blessConsumed : blessConsumed.toFixed(1)}` : '';

        const empLabel = labels[i];
        const isEmp = i >= 1;
        const isSelected = isBetting && isEmp && selectedTarget === empLabel;
        const clickable = isBetting && isEmp;

        let rowClass = 'player-row';
        if (i === 0) rowClass += ' boss-row';
        if (isSelected) rowClass += ' selected-emp';
        if (clickable) rowClass += ' clickable-emp';
        if (showTier && settlement) {
          if (isEmp) {
            const er = settlement.employeeResults[empLabel];
            if (er) {
              rowClass += er.won ? ' result-win' : ' result-lose';
              if (er.won && er.mult > 1) rowClass += ' result-mult';
            }
          }
        }

        const clickAttr = clickable ? ` onclick="selectEmployee('${empLabel}')"` : '';

        html += `<div class="${rowClass}"${clickAttr}>`;
        html += `<div class="player-label ${labelClasses[i]}">${labels[i]}</div>`;
        html += `<div class="cards-display">`;
        html += `<div class="card visible"><span class="card-corner tl">${v[0]}</span><span class="card-center">${v[0]}</span><span class="card-corner br">${v[0]}</span></div>`;
        html += `<div class="card visible"><span class="card-corner tl">${v[1]}</span><span class="card-center">${v[1]}</span><span class="card-corner br">${v[1]}</span></div>`;

        if (isRevealed) {
          for (let j = 2; j < 5; j++) {
            html += `<div class="card revealed"><span class="card-corner tl">${hand[j]}</span><span class="card-center">${hand[j]}</span><span class="card-corner br">${hand[j]}</span></div>`;
          }
        } else {

    // 斗口+点数1-9 → "点数N"，纯点数 → "点数N"，无斗口 → "MISS"
    function _getScoreLabel(hand) {
      const result = findDoukou(hand);
      if (!result) return 'miss';
      const type = result.type;
      if (type === '纯1') return '五幺';
      if (type === '纯10') return '愣十';
      // 斗口：取出点数两卡计算
      if (type.endsWith('斗口')) {
        const pts = calcPoints(result.points);
        if (pts === 10) return '马喽';
        return pts;
      }
      // 纯点数
      if (type === '纯点数') {

        return total;
      }
      return 'miss';
    }

    /**
     * 计算筹码曲线的波动次数
     * - 找出全部局部极值（峰和谷）
     * - 两个连续极值之差 >= threshold 算一次波动
     * - 对局结束时的最终值也算一个极值
     * - 返回 { count, extrema }
     */
    function _calcVolatility(pnlHistory, initialPurse) {
      const threshold = 20;
      if (!pnlHistory || pnlHistory.length < 3) return { count: 0, extrema: [] };

      // 转换为绝对筹码
      const vals = pnlHistory.map(p => initialPurse + p);

      // 找局部极值
      const extrema = [];
      for (let i = 1; i < vals.length - 1; i++) {
        if ((vals[i] >= vals[i - 1] && vals[i] >= vals[i + 1]) ||
            (vals[i] <= vals[i - 1] && vals[i] <= vals[i + 1])) {
          // 去重：连续等值时只取最后一个
          if (extrema.length === 0 || Math.abs(vals[i] - extrema[extrema.length - 1].val) > 0) {
            extrema.push({ idx: i, val: vals[i] });
          }
        }
      }
      // 最终值也算极值
      const lastVal = vals[vals.length - 1];
      if (extrema.length === 0 || Math.abs(lastVal - extrema[extrema.length - 1].val) > 0) {
        extrema.push({ idx: vals.length - 1, val: lastVal });
      }

      // 统计波动次数
      let count = 0;
      for (let i = 1; i < extrema.length; i++) {
        if (Math.abs(extrema[i].val - extrema[i - 1].val) >= threshold) {
          count++;
        }
      }

      return { count, extrema };
    }

    function updatePnlLabels(containerId) {
      const el = document.getElementById(containerId);
      if (!el) return;
      const initial = game._initialPurse || INITIAL_PURSE;
      const started = game.phase || game.roundNo > 0;
      const maxVal = started ? game.obsMaxPurse : '--';
      const minVal = started ? game.obsMinPurse : '--';
      let html = `<span class="lbl-max">${maxVal}</span>`;
      html += `<span>${initial}</span>`;
      html += `<span class="lbl-min">${minVal}</span>`;
      el.innerHTML = html;
    }

    function renderPnlChart() {
      const canvas = document.getElementById('pnl-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = Math.floor(rect.width);
      const h = Math.floor(rect.height);
      const dpr = window.devicePixelRatio || 2;

      // 画布尺寸只在变化时重置，防止移动端 WebKit 内存泄漏/闪退
      if (canvas._cacheW !== w || canvas._cacheH !== h || canvas._cacheDpr !== dpr) {
        canvas._cacheW = w;
        canvas._cacheH = h;
        canvas._cacheDpr = dpr;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
      }
      if (w <= 0 || h <= 0) return;

      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const data = game.pnlHistory;
      const shData = shadow.pnlHistory;

      if (data.length < 2) {
        ctx.restore();
        return;
      }

      const totalPoints = data.length;  // 以观察者为基准坐标系

      const allVals = [...data, ...shData, 0];
      const minVal = Math.min(...allVals);
      const maxVal = Math.max(...allVals);
      const range = Math.max(maxVal - minVal, 1);

      updatePnlLabels('pnl-labels');

      // Shadow curve（退场后延伸为水平直线，保持与观察者同一横向坐标系）
      if (shData.length >= 2) {
        ctx.strokeStyle = 'rgba(156,163,175,0.55)';
        ctx.lineWidth = 1;
        ctx.setLineDash(shData.length < totalPoints ? [4, 3] : []);  // 退场后虚线
        ctx.beginPath();
        for (let i = 0; i < totalPoints; i++) {
          // 影子数据不足时，用最后一个值延伸（水平直线）
          const val = i < shData.length ? shData[i] : shData[shData.length - 1];
          const x = (i / (totalPoints - 1)) * w;
          const y = h - ((val - minVal) / range) * (h - 8) - 4;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Player curve
      ctx.strokeStyle = data[data.length - 1] >= 0 ? '#10b981' : '#f43f5e';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / (totalPoints - 1)) * w;
        const y = h - ((data[i] - minVal) / range) * (h - 8) - 4;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.restore();
    }

    function renderEndPnlChart() {
      const canvas = document.getElementById('end-pnl-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = Math.floor(rect.width);
      const h = Math.floor(rect.height);
      const dpr = window.devicePixelRatio || 2;

      if (canvas._cacheW !== w || canvas._cacheH !== h || canvas._cacheDpr !== dpr) {
        canvas._cacheW = w;
        canvas._cacheH = h;
        canvas._cacheDpr = dpr;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
      }
      if (w <= 0 || h <= 0) return;

      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const data = game.pnlHistory;
      const shData = shadow.pnlHistory;

      if (data.length < 2) {
        ctx.restore();
        return;
      }

      const totalPoints = data.length;  // 以观察者为基准坐标系

      const allVals = [...data, ...shData, 0];
      const minVal = Math.min(...allVals);
      const maxVal = Math.max(...allVals);
      const range = Math.max(maxVal - minVal, 1);

      updatePnlLabels('end-pnl-labels');

      // Shadow curve（退场后延伸为水平虚线）
      if (shData.length >= 2) {
        ctx.strokeStyle = 'rgba(156,163,175,0.55)';
        ctx.lineWidth = 1;
        ctx.setLineDash(shData.length < totalPoints ? [4, 3] : []);
        ctx.beginPath();
        for (let i = 0; i < totalPoints; i++) {
          const val = i < shData.length ? shData[i] : shData[shData.length - 1];
          const x = (i / (totalPoints - 1)) * w;
          const y = h - ((val - minVal) / range) * (h - 8) - 4;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Player curve
      ctx.strokeStyle = data[data.length - 1] >= 0 ? '#10b981' : '#f43f5e';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = (i / (totalPoints - 1)) * w;
        const y = h - ((data[i] - minVal) / range) * (h - 8) - 4;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.restore();
    }

    // ═══════════════════════════════════════════════════════
    // Quiz Modal
    // ═══════════════════════════════════════════════════════
    const _qALL_ENTRIES = Object.entries(CORRECTED_TABLE).map(([key, v]) => {
      const [a, b] = key.split(',').map(Number);
      return { a, b, key, tier: Math.floor(v.tier), mn: v.mn, mp: v.mp };
    });
    const _qALL_MN = [...new Set(_qALL_ENTRIES.map(e => e.mn))];

    let _qMode = 'mn';
    let _qCorrect = 0;
    let _qTotal = 0;
    let _qNo = 1;
    let _qPending = false;
    let _qMnQ = null;
    let _qMnSelected = new Set();
    let _qMnSubmitted = false;
    let _qTierQ = null;
    let _qTierSubmitted = false;

    function _qShuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function _qUpdateScore() {
      document.getElementById('quiz-score-line').textContent =
        `${_qCorrect} / ${_qTotal} · 第 ${_qNo} 题`;
    }

    function showQuiz() {
      tap();
      document.getElementById('quiz-modal').classList.add('show');
      if (!_qMnQ && !_qTierQ) _qNextQuestion();
    }

    function closeQuiz(e) {
      if (e && e.target !== e.currentTarget) return;
      tap();
      document.getElementById('quiz-modal').classList.remove('show');
    }

    function qSwitchMode(mode) {
      tap();
      _qMode = mode;
      _qPending = false;
      document.getElementById('quiz-tab-mn').classList.toggle('active', mode === 'mn');
      document.getElementById('quiz-tab-tier').classList.toggle('active', mode === 'tier');
      _qNextQuestion();
    }

    // ――― 识别码模式 ―――
    function _qBuildMn() {
      const mn = _qALL_MN[Math.floor(Math.random() * _qALL_MN.length)];
      const correctEntries = _qALL_ENTRIES.filter(e => e.mn === mn);
      const correctKeys = new Set(correctEntries.map(e => e.key));
      const distractors = _qShuffle(_qALL_ENTRIES.filter(e => !correctKeys.has(e.key)));
      const needed = Math.max(0, 8 - correctEntries.length);
      const optionPool = _qShuffle([...correctEntries, ...distractors.slice(0, needed)]);
      _qMnQ = { mn, correctKeys, options: optionPool };
      _qMnSelected = new Set();
      _qMnSubmitted = false;
    }

    function _qRenderMn() {
      if (!_qMnQ) _qBuildMn();
      const q = _qMnQ;
      // 选项按组合号从小到大排序（a升序，a相同则b升序）
      const sortedOpts = [...q.options].sort((x, y) => x.a !== y.a ? x.a - y.a : x.b - y.b);
      let html = '<div class="quiz-card">';
      html += '<div class="quiz-label">识别码（口诀）</div>';
      html += `<div class="quiz-mnemonic">${q.mn}</div>`;
      html += '<div class="quiz-label">选出所有属于该口诀的组合</div>';
      html += '<div class="quiz-options-grid">';
      for (const entry of sortedOpts) {
        let cls = 'quiz-option';
        if (_qMnSubmitted) {
          const isC = q.correctKeys.has(entry.key);
          const isSel = _qMnSelected.has(entry.key);
          if (isC) cls += ' correct';
          else if (isSel) cls += ' wrong';
        } else if (_qMnSelected.has(entry.key)) cls += ' selected';
        const label = `${entry.a}-${entry.b}`;
        const onclick = _qMnSubmitted ? '' : `onclick="qMnToggle('${entry.key}')"` ;
        html += `<button class="${cls}" ${onclick}><span class="opt-pair">${label}</span><span class="opt-mp">${entry.mp}</span></button>`;
      }
      html += '</div>';
      html += `<div class="quiz-feedback" id="quiz-feedback"></div>`;
      const disabled = _qMnSubmitted ? 'disabled' : '';
      html += `<button class="quiz-submit-btn" onclick="qMnSubmit()" ${disabled}>提交</button>`;
      html += '</div>';
      document.getElementById('quiz-area').innerHTML = html;
    }

    function qMnToggle(key) {
      if (_qMnSubmitted || _qPending) return;
      if (_qMnSelected.has(key)) _qMnSelected.delete(key);
      else _qMnSelected.add(key);
      _qRenderMn();
    }

    function qMnSubmit() {
      if (_qMnSubmitted || _qPending) return;
      const q = _qMnQ;
      const selArr = [..._qMnSelected].sort();
      const corArr = [...q.correctKeys].sort();
      const isRight = selArr.length === corArr.length && selArr.every((k,i) => k === corArr[i]);
      _qMnSubmitted = true;
      _qTotal++;
      if (isRight) _qCorrect++;
      _qUpdateScore();
      _qRenderMn();
      const fb = document.getElementById('quiz-feedback');
      if (isRight) {
        fb.textContent = '✓ 正确！'; fb.className = 'quiz-feedback ok';
        _qPending = true;
        setTimeout(() => { _qPending = false; _qNo++; _qBuildMn(); _qRenderMn(); _qUpdateScore(); }, 2000);
      } else {
        _qMnSubmitted = false;
        _qRenderMn();
        document.getElementById('quiz-feedback').textContent = '✗ 错误，继续选择正确答案';
        document.getElementById('quiz-feedback').className = 'quiz-feedback err';
      }
    }

    // ――― 战力模式 ―――
    function _qBuildTier() {
      const picked = _qShuffle(_qALL_ENTRIES).slice(0, 3);
      const correctMps = picked.map(e => e.mp);
      const distractors = [...new Set(_qShuffle(_qALL_ENTRIES.filter(e => !correctMps.includes(e.mp))).map(e => e.mp))];
      const pool = [...new Set(correctMps)];
      for (const mp of distractors) { if (pool.length >= 8) break; if (!pool.includes(mp)) pool.push(mp); }
      while (pool.length < 8) { const r = _qALL_ENTRIES[Math.floor(Math.random()*_qALL_ENTRIES.length)].mp; if (!pool.includes(r)) pool.push(r); }
      _qTierQ = { pairs: picked, slots: [null,null,null], opts: _qShuffle(pool.slice(0,8)) };
      _qTierSubmitted = false;
    }

    function _qRenderTier() {
      if (!_qTierQ) _qBuildTier();
      const q = _qTierQ;
      // 备选战力值从大到小排序
      const sortedOpts = [...q.opts].sort((a, b) => b - a);
      let html = '<div class="quiz-card">';
      html += '<div class="quiz-label">判断以下 3 组起手牌的绝对战力值</div>';
      html += '<div class="quiz-pairs-row">';
      for (let i = 0; i < 3; i++) {
        const p = q.pairs[i];
        html += `<div class="quiz-pair-card"><div class="quiz-pair-label">组合 ${i+1}</div><div class="quiz-pair-val">${p.a} · ${p.b}</div></div>`;
      }
      html += '</div>';
      html += '<div class="quiz-slots-row">';
      for (let i = 0; i < 3; i++) {
        let cls = 'quiz-slot';
        let val = q.slots[i] !== null ? q.slots[i] : '';
        if (q.slots[i] !== null) cls += ' filled';
        if (_qTierSubmitted) { const ok = q.slots[i] === q.pairs[i].mp; cls = cls.replace(' filled','') + (ok ? ' correct' : ' wrong'); }
        html += `<div class="${cls}">${val}</div>`;
      }
      const clrDis = _qTierSubmitted ? 'disabled' : '';
      html += `<button class="quiz-clear-btn" onclick="qTierClear()" ${clrDis}>清除</button></div>`;
      html += '<div class="quiz-tier-opts">';
      const usedC = {}; for (const s of q.slots) if (s!==null) usedC[s]=(usedC[s]||0)+1;
      const availC = {}; for (const t of sortedOpts) availC[t]=(availC[t]||0)+1;
      for (const t of sortedOpts) {
        let cls = 'quiz-tier-opt';
        if (!_qTierSubmitted && (usedC[t]||0) >= (availC[t]||1)) cls += ' used';
        const onclick = _qTierSubmitted ? '' : `onclick="qTierPick(${t})"`;
        html += `<button class="${cls}" ${onclick}>${t}</button>`;
      }
      html += '</div>';
      html += `<div class="quiz-feedback" id="quiz-feedback"></div>`;
      const filledAll = q.slots.every(s => s !== null);
      const dis = (_qTierSubmitted || !filledAll) ? 'disabled' : '';
      html += `<button class="quiz-submit-btn" onclick="qTierSubmit()" ${dis}>提交</button></div>`;
      document.getElementById('quiz-area').innerHTML = html;
    }

    function qTierPick(val) {
      if (_qTierSubmitted || _qPending) return;
      const idx = _qTierQ.slots.indexOf(null);
      if (idx === -1) return;
      _qTierQ.slots[idx] = val;
      _qRenderTier();
    }

    function qTierClear() {
      if (_qTierSubmitted || _qPending) return;
      for (let i = 2; i >= 0; i--) { if (_qTierQ.slots[i] !== null) { _qTierQ.slots[i] = null; break; } }
      _qRenderTier();
    }

    function qTierSubmit() {
      if (_qTierSubmitted || _qPending) return;
      if (_qTierQ.slots.some(s => s === null)) return;
      const isRight = _qTierQ.slots.every((s,i) => s === _qTierQ.pairs[i].mp);
      _qTierSubmitted = true;
      _qTotal++;
      if (isRight) _qCorrect++;
      _qUpdateScore();
      _qRenderTier();
      const fb = document.getElementById('quiz-feedback');
      if (isRight) {
        fb.textContent = '✓ 正确！'; fb.className = 'quiz-feedback ok';
        _qPending = true;
        setTimeout(() => { _qPending = false; _qNo++; _qBuildTier(); _qRenderTier(); _qUpdateScore(); }, 2000);
      } else {
        _qTierSubmitted = false;
        _qTierQ.slots = [null,null,null];
        _qRenderTier();
        document.getElementById('quiz-feedback').textContent = '✗ 错误，重新填写';
        document.getElementById('quiz-feedback').className = 'quiz-feedback err';
      }
    }

    function _qNextQuestion() {
      if (_qMode === 'mn') { _qBuildMn(); _qRenderMn(); }
      else { _qBuildTier(); _qRenderTier(); }
      _qUpdateScore();
    }

            <span class="analysis-pct ${a.dodgeTotal > 0 && (a.dodgeCorrect / a.dodgeTotal) >= 0.5 ? 'positive' : 'negative'}">${a.dodgeTotal > 0 ? pct(a.dodgeCorrect, a.dodgeTotal) : '-'}</span>
          </div>
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════════════════

    // 消除移动端 300ms 点击延迟和双击缩放，降低 WebView 图层崩溃概率
    (function() {
      const s = document.createElement('style');
      s.textContent = 'body, button, .card, .player-row, .bet-btn, .tier-table-btn, .quiz-option, .quiz-tier-opt, .quiz-submit-btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }';
      document.head.appendChild(s);
    })();

    showScreen('start-screen');
    initStartScreen();
  </script>
</body>
</html>
